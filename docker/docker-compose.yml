# docker/docker-compose.yml
# Usage: docker compose -f docker/docker-compose.yml up
#
# Variables d'environnement à définir dans .env (non commité):
#   TOKEN_TWITCH, CLIENT_ID, CLIENT_SECRET, DISCORD_BOT_TOKEN,
#   DISCORD_CHANNEL_ID, CHANNELS, CHANNEL_ID

services:
  a3:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: a3-twitch
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      # Montage des dossiers pour persister les clips et logs.
      # a3_validated/a3_highlights/a3_rejected pointaient jusqu'ici sur l'ancien layout
      # à plat (clips_validated/, clips_highlights/, clips_rejected/ à la racine) — le
      # code écrit depuis la refonte BASE_DIR dans clips/{channel}/{validated,highlights,
      # rejected}, donc ces clips ne persistaient plus du tout entre deux conteneurs
      # (perdus à chaque recréation). Remplacé par un seul volume sur /app/clips.
      - a3_clips_output:/app/clips_output
      - a3_clips_reviewed:/app/clips
      - a3_decisions:/app/decisions
      - a3_logs:/app/logs
      - a3_cache:/app/cache
      # pending_reviews.json fait survivre l'état des reviews Discord en attente à un
      # redémarrage du bot (voir mainRendererTwitch.py) — sans ce montage, il était
      # perdu à chaque recréation du conteneur. Le Dockerfile crée ce fichier ("[]")
      # avant ce point de montage, sinon Docker en ferait un dossier au lieu d'un fichier.
      - a3_pending_reviews:/app/pending_reviews.json
    environment:
      - PYTHONUNBUFFERED=1
    # Permet d'accéder au stream (network_mode: host nécessaire pour streamlink)
    network_mode: host
    cap_add:
      - NET_ADMIN
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  a3_clips_output:
  a3_clips_reviewed:
  a3_decisions:
  a3_logs:
  a3_cache:
  a3_pending_reviews:
