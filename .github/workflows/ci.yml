name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances (dont dev: ruff, mypy, pytest)
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check src/ tests/

      - name: mypy
        run: mypy src/

      - name: pytest
        run: pytest tests/ -v
